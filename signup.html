<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Page</title>
  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />
  <script src="script.js" defer></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #F4F4F4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-image: url('images/background-image.jpg');
      background-size: cover;
      background-position: center;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: -1;
    }

    .container {
      display: flex;
      width: 800px;
      background-color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    .left-section {
      width: 40%;
      background-color: #7A6C5D;
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    .left-section h1 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    .left-section p {
      font-size: 1em;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .button-link {
      padding: 10px 20px;
      background-color: #C4A76F;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      display: inline-block;
    }

    .button-link:hover {
      background-color: #6B7280;
    }

    .go-back-home {
      text-align: end;
      margin-top: 150px;
    }

    .go-back-home a {
      text-decoration: none;
      background-color: #C4A76F;
      color: white;
      padding: 8px 15px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .go-back-home a:hover {
      background-color: #7A6C5D;
    }

    .right-section {
      width: 60%;
      padding: 40px;
    }

    .right-section h2 {
      font-size: 2em;
      margin-bottom: 20px;
      color: #2D2D2D;
    }

    .right-section form {
      display: flex;
      flex-direction: column;
    }

    .right-section label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .right-section input {
      width: calc(100% - 22px);
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #D1D5DB;
      border-radius: 5px;
      font-size: 1em;
      color: #333333;
    }

    .right-section button {
      width: 100%;
      padding: 12px;
      background-color: #7A6C5D;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .right-section button:hover {
      background-color: #C4A76F;
    }

    .social-signup {
      margin-top: 20px;
      text-align: center;
    }

    .social-signup a {
      display: inline-block;
      margin: 0 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #6B7280;
      text-decoration: none;
      line-height: 40px;
      text-align: center;
      color: white;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        width: 90%;
      }

      .left-section, .right-section {
        width: 100%;
        text-align: center;
      }

      .left-section {
        align-items: center;
      }

      .go-back-home {
        text-align: center;
        margin-top: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left-section">
      <h1>Join us!</h1>
      <p>Get instant access to new journals, follow your favorites, and receive instant updates.</p>
      <p>Already have an account?</p>
      <a href="login.html" class="button-link">Sign In</a>
      <div class="go-back-home">
        <a href="index.html">⬅ Go back to Home</a>
      </div>
    </div>

    <!-- ===== Sign Up Form ===== -->
    <div class="right-section">
      <h2>Sign Up</h2>
      <form action="signup.php" method="POST">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Jackson_Hall" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="jackson123@gmail.com" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="********" required>

        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="********" required>

        <button type="submit">Sign Up</button>
      </form>

      <div class="social-signup">
        <p>or sign up with</p>
        <a href="#">G+</a>
        <a href="#">f</a>
        <a href="#">in</a>
      </div>
    </div>
  </div>

</body>
</html>

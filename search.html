<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - JournalTOCs</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />

    <style>
    /* Global Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    
    html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column; }

    body {
        background-color: white;;
        color: #2D2D2D;
        line-height: 1.5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* ======= Header (Fixed & Styled) ======= */
    header {
        background-color: #2D2D2D;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        color: white;
        align-items: center;
        width: 100%;
        top: 0;
        z-index: 1000;
    }

    header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1300px;
    margin: 0 auto;
}

    header .logo {
        height: 80px;
        width: auto;
        background-color: white;
        padding: 3px;
        border-radius: 5px;
    }
    .nav {
    flex-grow: 1;
    display: flex;
  
}
    nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
    }

    nav ul li {
        margin: 0 20px;
    }

    nav ul li a {
        text-decoration: none;
        color: #eee;
        font-size: 1.2rem;
        font-weight: bold;
        transition: color 0.3s ease;
    }

    nav ul li a:hover {
        color: #C4A76F;
    }
/* ====== Authentication Buttons ====== */
.auth-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .signup-btn {
            padding: 10px 18px;
            font-size: 1rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #C4A76F; 
            color: white; 
            border: none;
            cursor: pointer;  
        }

        .signup-btn:hover {
            background-color: #7A6C5D; 
        }


/* Profile Icon */
.profile-icon img {
    width: 40px !important;
    height: 40px !important;
    object-fit: cover !important;
    max-height: 100% !important;
    margin: 15px !important;
    padding: 0 !important;
}
    /* ======= Main Content ======= */
    main {
        max-width: 800px;
        margin: 100px auto ;
        text-align: center;
        padding-top: 50px;
        padding-bottom: 150px;
    }


    main h1 {
    font-size: 2.5rem; 
    font-weight: bold;
    margin-bottom: 20px;
}
    
    #search-results {
        list-style: none;
        padding: 0;
    }

    #search-results li {
        background: #C4A76F;
        margin: 10px 0;
        padding: 15px;
        border-radius: 5px;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #search-results li:hover {
    transform: translateY(-5px);  
    box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.2); 
    background: #7A6C5D; 
    cursor: pointer;
}

    /* ======= Footer (Consistent with Other Pages) ======= */
    footer {
    background-color: #2D2D2D; 
    color: #D1D5DB; 
    padding: 15px 0;
    width: 100%; 
    bottom: 0;
    left: 0;
    position: relative;
    font-size: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;  
}

.footer-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1300px; 
    margin: 0 auto;
    width: 100%;
}

/* Left-aligned Terms & Privacy */
.footer-left {
    text-align: left;
    display: flex;
    flex-direction: column;
}

/* Terms and Privacy Policy */
.footer-left a {
    color: #C4A76F; 
    text-decoration: none;
    font-size: 1rem;
    margin-bottom: 5px;
}

.footer-left a:hover {
    text-decoration: underline;
}

/* Centered Copyright */
.footer-center {
    text-align: center;
    flex-grow: 1; 
    font-size: 1.0rem;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

/* Right-aligned Social Media Icons */
.footer-right {
    margin-left: auto; 
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 15px;
}

/* Bigger Social Media Icons */
.footer-right a img {
    width: 60px;  
    height: 60px;
    opacity: 0.9;
    transition: opacity 0.3s ease;
}

.footer-right a img:hover {
    opacity: 1;
}

    /* Responsive Design */
    @media (max-width: 768px) {
        .footer-container {
            flex-direction: column;
            text-align: center;
        }
}

    </style>
    <!--END OF INTERNAL CSS-->
        
</head>
<body>
    <header>    
        <div class="nav-container">
            <img src="images/logo.png" alt="JournalTOCs Logo">
            <nav> 
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="Publishers_p1.html">Publishers</a></li>
                    <li><a href="Subjects_p1.html">Subjects</a></li>
                    <li><a href="Journals_p1.html">Journals</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
                <div class="hamburger" onclick="toggleNav()">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </nav>
        </div>
        <div class="auth-buttons">
            <button class="signup-btn" onclick="window.location.href='signup.html'">Sign Up</button>
        </div>
        <div class="profile-icon">
            <img src="images/profile-icon.png" alt="Profile" onclick="window.location.href='login.html'" style="cursor:pointer;">
        </div>
    </header>

    <main>
        <h1>Search Results</h1>
        <ul id="search-results"></ul>
        
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <a href="#">Terms & Conditions</a>
                <a href="#">Privacy Policy</a>
            </div>
           
            <div class="footer-right">
                <a href="#"><img src="images/twitter-icon.jpeg" alt="Twitter"></a> 
                <a href="#"><img src="images/linkedin-icon.png" alt="LinkedIn"></a> 
            </div>
      
            <div class="footer-center">
                <p>© 2025 JournalTOCs. All rights reserved.</p>
            </div>
        </div>
      </footer>

    <script>
            document.addEventListener("DOMContentLoaded", function () {
            // Get search query from URL
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get("query") ? urlParams.get("query").toLowerCase() : "";
        
            // Dummy dataset to simulate search results
            const data = [
                "Introduction to Computer Science",
                "Advanced Business Strategies",
                "Fundamentals of Biology",
                "Mechanical Engineering Innovations",
                "Modern Educational Methods",
                "Artificial Intelligence Research",
                "Journal of Data Science",
                "Physics and Astronomy Review"
            ];
        
            const resultsContainer = document.getElementById("search-results");
            resultsContainer.innerHTML = "";
        
            // Display a message if no query is entered
            if (!query) {
                resultsContainer.innerHTML = "<p>Showing sample results. Please enter a search term for specific results.</p>";
            }
        
            // Filter and display matching results
            const filteredResults = data.filter(item => item.toLowerCase().includes(query));
        
            if (filteredResults.length > 0) {
                filteredResults.forEach(item => {
                    const li = document.createElement("li");
                    li.textContent = item;
                    resultsContainer.appendChild(li);
                });
            } else {
                resultsContainer.innerHTML += "<p>No results found for '" + query + "'. Showing sample results.</p>";
                data.slice(0, 5).forEach(item => {  // Show first 5 sample results
                    const li = document.createElement("li");
                    li.textContent = item;
                    resultsContainer.appendChild(li);
                });
            }
        });
    </script>     
</body>
</html>

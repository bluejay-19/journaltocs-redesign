<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="script.js" defer></script>
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />

    <!--START OF INTERNAL CSS-->
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('images/background-image.jpg'); /* Replace with your image path */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Adjust opacity as needed */
            z-index: -1;
        }

        .login-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            width: 800px; /* Adjust as needed */
            max-width: 90%;
            height: 750px; ;
        }

        .login-form {
            padding: 40px;
            width: 50%;
        }

        .login-form h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .login-form p {
            margin-bottom: 30px;
            font-size: 14px;
            color: #666;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        .login-form input[type="email"],
        .login-form input[type="password"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        .login-form .remember-forgot {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .login-form .remember-forgot label {
            font-weight: normal;
        }

        .login-form button {
            background-color: #7A6C5D; 
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            font-size: 18px; 
        }
        .login-form button:hover {
    background-color:#C4A76F ; }

        .login-form .or-login {
            text-align: center;
            margin-bottom: 20px;
        }

        .google-login {
            background-color: white;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .google-login:hover {
    background-color:#C4A76F ; 
}
         .google-login img {
            margin-right: 10px;
            height: 20px;
        }

        .login-form .register-link {
            text-align: center;
            font-size: 16px;
        }
.go-back-home {
    text-align: center;
    margin-top: 160px; /* Spacing after the form */
}

.go-back-home a {
    display: inline-block;
    text-decoration: none;
    background-color: #C4A76F; /* Match your theme color */
    color: white;
    padding: 8px 15px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: bold;
    transition: background 0.3s ease;
}

.go-back-home a:hover {
    background-color: #7A6C5D; /* Darker shade on hover */
}
        .design-section {
            width: 50%;
            background-color: #7A6C5D; 
            border-radius: 0 8px 8px 0;
            padding: 40px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center; /* Centers the text */          
}
.design-section h2 {
    font-size: 2em;
    margin-bottom: 30px;
    color: white;
  }

        /* Add your design elements here using absolute positioning, shapes, etc. */
        .design-section::before, .design-section::after {
            content: '';
            position: absolute;
            /* Add your shapes and styling here */
        }
    </style>
<!--END OF INTERNAL CSS-->

</head>
<body>

    <div class="login-container">

        <div class="login-form">
            <h1>Sign In</h1>

            <form>
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="Enter your mail address">

                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Enter password">

                <div class="remember-forgot">
                    <label><input type="checkbox" name="remember"> Remember me</label>
                    <a href="#">Forgot your password?</a>
                </div>

                <button type="submit">Login</button>

                <div class="or-login">Or Login with</div>

                <button class="google-login">
                    <img src="images/google-logo.png" alt="Google Logo">
                    <span>Sign in with Google</span>
                </button>

                <div class="register-link">Don't have an account? <a href="signup.html">Register here</a></div>
                <div class="go-back-home">
                    <a href="index.html">⬅ Go back to Home</a>
                </div>
                
            </form>
        </div>
        <div class="design-section">
            <h2>Welcome back!</h2>
            <p>Login to access your saved journals and alerts.</p>
        </div>
    </div>
</body>
</html>
